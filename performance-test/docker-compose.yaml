version: '3.3'
services:
  k6:
    image: grafana/k6@sha256:c70aaeaa1d9e4758ba5f292b1a0c73269fd949669c0d1042b2b1e18c58f07b82
    container_name: k6
    volumes:
      - '${PWD}/src:/scripts'
    environment:
      - OCP_APIM_SUBSCRIPTION_KEY=${ocp_apim_subscription_key}
      - VARS=${env}.environment.json
      - TEST_TYPE=/scripts/test-types/${type}.json
      - K6_OUT=influxdb=http://nginx:8086/${db_name}
    command: run /scripts/${script}.js
    depends_on:
      - nginx

  nginx:
    image: nginx@sha256:9c367186df9a6b18c6735357b8eb7f407347e84aea09beb184961cb83543d46e
    container_name: nginx
    volumes:
      - '${PWD}/nginx/nginx.conf:/etc/nginx/nginx.conf'
    environment:
      - ENVIRONMENT=${env}
    ports:
      - "8086:8086"
      - "80:80"

